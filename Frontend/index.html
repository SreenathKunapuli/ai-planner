<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply saved (or system) theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem('planner-theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI Planner — tell it your tasks, get a realistic daily, monthly, or yearly schedule. Edit with drag-and-drop, refine with AI, saved to your account." />
    <meta name="theme-color" content="#FCFCFD" />
    <meta property="og:title" content="AI Planner" />
    <meta property="og:description" content="Turn your tasks into a schedule with AI — daily timelines, monthly calendars, yearly roadmaps." />
    <meta property="og:type" content="website" />
    <title>AI Planner — schedules that build themselves</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
